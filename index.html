<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Jardin">
<title>Mon Jardin</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1a2e1a;
  --green-mid: #2d4f2d;
  --green-accent: #4a8c4a;
  --green-light: #7ab87a;
  --cream: #f5f0e8;
  --cream-dark: #e8e0d0;
  --text-dark: #1a1a1a;
  --text-mid: #4a4a4a;
  --text-light: #8a8a8a;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
header{background:var(--green-dark);padding:1rem 1.25rem 0;position:sticky;top:0;z-index:30}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);display:flex;align-items:center;gap:10px}
.logo-leaf{width:26px;height:26px;background:var(--green-accent);border-radius:50% 50% 50% 0;transform:rotate(-45deg);flex-shrink:0}
.header-actions{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:var(--cream);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s}
.btn-icon:hover{background:rgba(255,255,255,0.18)}
.btn-add-main{height:36px;padding:0 14px;border-radius:var(--radius-sm);border:none;background:var(--green-accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-add-main:hover{background:var(--green-light)}
.tabs-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px 10px;font-size:13px;color:rgba(245,240,232,0.5);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--cream)}
.tab.active{color:var(--cream);border-bottom-color:var(--green-light);font-weight:500}
main{padding:1.25rem;max-width:960px;margin:0 auto}
.section-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--green-dark);margin-bottom:1rem;display:flex;align-items:baseline;gap:8px}
.section-count{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-light);font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.card{border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:3/4;background:var(--green-mid);transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img{transform:scale(1.05)}
.card-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--green-mid),var(--green-dark))}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,20,10,0.85) 0%,rgba(10,20,10,0.25) 55%,transparent 100%)}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:.75rem}
.card-name{font-family:'Playfair Display',serif;font-size:15px;color:#fff;line-height:1.25;margin-bottom:3px}
.card-latin{font-size:10px;color:rgba(255,255,255,0.55);font-style:italic;margin-bottom:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:500}
.tag-flor{background:rgba(122,184,122,0.3);color:#d4f5d4;border:1px solid rgba(122,184,122,0.35)}
.tag-expo{background:rgba(250,200,80,0.22);color:#fde8a0;border:1px solid rgba(250,200,80,0.28)}
.empty{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--text-light)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.35}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,25,15,0.6);z-index:100;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;padding:1.5rem;margin:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--green-dark)}
.btn-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);line-height:1;padding:2px 5px}
.btn-x:hover{color:var(--text-dark)}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:11px;color:var(--text-light);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.field input,.field select,.field textarea{width:100%;border-radius:var(--radius-sm);border:1px solid var(--cream-dark);padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-dark);background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green-accent)}
.field textarea{min-height:68px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--cream-dark)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
.btn-outline{background:#fff;border:1px solid var(--cream-dark);color:var(--text-mid)}
.btn-outline:hover{border-color:var(--green-accent);color:var(--green-accent)}
.btn-green{background:var(--green-accent);border:none;color:#fff}
.btn-green:hover{background:var(--green-mid)}
.btn-red{background:#fff;border:1px solid #f0a0a0;color:#c0392b;margin-right:auto}
.btn-red:hover{background:#fff5f5}
.btn-ai{background:var(--green-dark);border:none;color:var(--cream);width:100%;justify-content:center;margin-bottom:.875rem;font-size:13px}
.btn-ai:hover{background:var(--green-mid)}
.btn-ai:disabled{opacity:.5;cursor:not-allowed}
.ai-hint{font-size:11px;color:var(--text-light);text-align:center;margin-bottom:1rem;margin-top:-.5rem}
.detail-hero{width:100%;height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:1rem}
.detail-hero-placeholder{width:100%;height:160px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--green-mid),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:1rem}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.df{padding:8px 10px;background:var(--cream);border-radius:var(--radius-sm)}
.dl{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.dv{font-size:13px;color:var(--text-dark);line-height:1.4}
.notes-box{background:var(--cream);border-radius:var(--radius-sm);padding:10px;font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:1rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green-dark);color:var(--cream);padding:10px 20px;border-radius:99px;font-size:13px;z-index:200;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-bar{display:flex;align-items:center;gap:8px;padding:.5rem 0 .75rem;font-size:11px;color:rgba(245,240,232,0.55)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green-light)}
.sync-dot.err{background:#e07070}
.sync-dot.loading{background:#f0c040;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-leaf"></div>
      Mon Jardin
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="syncNow()" title="Synchroniser">↻</button>
      <button class="btn-add-main" onclick="openAdd()">＋ Ajouter</button>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Connexion…</span>
  </div>
  <div class="tabs-bar" id="tabs"></div>
</header>

<main>
  <div class="section-title">
    <span id="massifTitle"></span>
    <span class="section-count" id="massifCount"></span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- Modal ajout / modification -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="addModalTitle">Ajouter une plante</span>
      <button class="btn-x" onclick="closeOverlay('addOverlay')">✕</button>
    </div>
    <div class="field">
      <label>Nom commun *</label>
      <input id="fNom" placeholder="Dahlia, Rosier…">
    </div>
    <button class="btn btn-ai" id="btnGenerate" onclick="generateFiche()">
      <span id="genIcon">✦</span> Générer la fiche automatiquement
    </button>
    <p class="ai-hint">Entre le nom, clique sur Générer · corrige ensuite si besoin</p>
    <div class="field"><label>Nom latin</label><input id="fLatin" placeholder="Dahlia pinnata"></div>
    <div class="field"><label>Massif</label><select id="fMassif"></select></div>
    <div class="row2">
      <div class="field"><label>Date de plantation</label><input id="fDate" type="date"></div>
      <div class="field"><label>Exposition</label>
        <select id="fExpo">
          <option value="">—</option><option>Plein soleil</option><option>Mi-ombre</option><option>Ombre</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Floraison</label><input id="fFlor" placeholder="Juin – Oct."></div>
      <div class="field"><label>Couleur</label><input id="fCoul" placeholder="Rouge, rose…"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Type de sol</label><input id="fSol" placeholder="Drainant…"></div>
      <div class="field"><label>Arrosage</label>
        <select id="fArro">
          <option value="">—</option><option>Faible</option><option>Modéré</option><option>Régulier</option><option>Abondant</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Taille adulte</label><input id="fTaille" placeholder="60 cm – 1 m"></div>
    <div class="field"><label>Notes personnelles</label><textarea id="fNotes" placeholder="Observations, entretien…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-red" id="btnDel" style="display:none" onclick="deletePlant()">🗑 Supprimer</button>
      <button class="btn btn-outline" onclick="closeOverlay('addOverlay')">Annuler</button>
      <button class="btn btn-green" id="btnSave" onclick="savePlant()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal détail -->
<div class="overlay" id="detOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="detTitle"></span>
      <button class="btn-x" onclick="closeOverlay('detOverlay')">✕</button>
    </div>
    <div id="detBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="editFromDetail()">✎ Modifier</button>
      <button class="btn btn-green" onclick="closeOverlay('detOverlay')">Fermer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────
const SHEET_ID      = '1Hp0J2iwvFoSwqwd2nrlR0ILUfDx57y27-mMLxOeG2-U';
const API_KEY       = 'AIzaSyCsMZVzrkRchl6Yqrz8X8d9bM07yycom54';
const SCRIPT_URL    = 'https://script.google.com/macros/s/AKfycbwKVTE1Fk4voP3OEZgRvpcUyzOP2YwuTXoT9us3OIiMmvjIIDpTdW8IVEFau5Z9nApXvg/exec';
const SHEET_NAME    = 'Plantes';
const MASSIFS       = ["Demi Lune", "Allée d'Agrumes", "Le Central"];
// ───────────────────────────────────────────────────────

const ICONS = {
  dahlia:'🌸',surfinia:'🌺',oeillet:'🌼',saule:'🌿',olivier:'🫒',
  citron:'🍋',pamplemousse:'🍊',oranger:'🍊',rosier:'🌹',rose:'🌹',
  sauge:'🌿',pivoine:'🌸',tremiere:'🌻',begonia:'🌺',
  lavande:'💜',hortensia:'💐',jasmin:'🌼',iris:'🌸',tulipe:'🌷',
  fougere:'🌿',bambou:'🎋',laurier:'🌿',mimosa:'🌼',magnolia:'🌸'
};

const IMG_MAP = {
  'dahlia':           'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Dahlia_x_hybrida.jpg/400px-Dahlia_x_hybrida.jpg',
  'surfinia':         'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Petunia_hybrida2.jpg/400px-Petunia_hybrida2.jpg',
  'oeillet de poète': 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Dianthus_barbatus0.jpg/400px-Dianthus_barbatus0.jpg',
  'oeillet':          'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Dianthus_barbatus0.jpg/400px-Dianthus_barbatus0.jpg',
  'saule crevette':   'https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Salix_integra_Hakuro_Nishiki_2010.jpg/400px-Salix_integra_Hakuro_Nishiki_2010.jpg',
  'olivier':          'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Olive_trees_in_Matera.jpg/400px-Olive_trees_in_Matera.jpg',
  'citron 4 saison':  'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Lemon_-_whole_and_split.jpg/400px-Lemon_-_whole_and_split.jpg',
  'citron':           'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Lemon_-_whole_and_split.jpg/400px-Lemon_-_whole_and_split.jpg',
  'pamplemousse':     'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Pomelo_-_edit.jpg/400px-Pomelo_-_edit.jpg',
  'citron caviar':    'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Finger_lime_au.jpg/400px-Finger_lime_au.jpg',
  'citron vert':      'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Limes.jpg/400px-Limes.jpg',
  'oranger':          'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Oranges_-_whole-halved-segment.jpg/400px-Oranges_-_whole-halved-segment.jpg',
  'rosier':           'https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Simple_botanic_garden_flower.jpg/400px-Simple_botanic_garden_flower.jpg',
  'sauge perroquet':  'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Salvia_elegans.jpg/400px-Salvia_elegans.jpg',
  'pivoine':          'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Peony_2.jpg/400px-Peony_2.jpg',
  'rose trémière':    'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Alcea_rosea_Nigra.jpg/400px-Alcea_rosea_Nigra.jpg',
  'bégonia nain':     'https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Begonia_semperflorens.jpg/400px-Begonia_semperflorens.jpg',
  'lavande':          'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Lavandula_angustifolia_Lamiaceae.jpg/400px-Lavandula_angustifolia_Lamiaceae.jpg',
  'hortensia':        'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Hydrangea_macrophylla.jpg/400px-Hydrangea_macrophylla.jpg',
};

function getImg(nom) {
  if (!nom) return null;
  const n = nom.toLowerCase();
  for (const [k, v] of Object.entries(IMG_MAP)) {
    if (n.includes(k) || k.includes(n)) return v;
  }
  return null;
}

function getIcon(nom) {
  if (!nom) return '🌱';
  const n = nom.toLowerCase();
  for (const [k, v] of Object.entries(ICONS)) {
    if (n.includes(k)) return v;
  }
  return '🌱';
}

// ── State ──────────────────────────────────────────────
let plants = [];
let currentMassif = MASSIFS[0];
let editingId = null;
let viewingId = null;

// ── Sync status ────────────────────────────────────────
function setSyncStatus(state, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}

// ── Google Sheets : lecture ────────────────────────────
async function fetchPlants() {
  setSyncStatus('loading', 'Chargement…');
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:M?key=${API_KEY}`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.error) throw new Error(data.error.message);
    const rows = data.values || [];
    plants = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row[2]) continue;
      plants.push({
        rowIndex: i + 1,
        id:       row[0] || String(i),
        massif:   row[1] || '',
        nom:      row[2] || '',
        latin:    row[3] || '',
        date:     row[4] || '',
        expo:     row[5] || '',
        floraison:row[6] || '',
        couleur:  row[7] || '',
        sol:      row[8] || '',
        arrosage: row[9] || '',
        taille:   row[10] || '',
        notes:    row[11] || '',
        imgUrl:   row[12] || '',
      });
    }
    setSyncStatus('ok', `Synchronisé · ${plants.length} plante${plants.length !== 1 ? 's' : ''}`);
  } catch(e) {
    setSyncStatus('err', 'Erreur : ' + e.message);
  }
}

// ── Google Sheets : écriture via Apps Script ───────────
async function scriptCall(payload) {
  const r = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  const text = await r.text();
  try { return JSON.parse(text); } catch(e) { return { ok: true }; }
}

async function appendRow(row) {
  return scriptCall({ action: 'append', row });
}

async function updateRow(rowIndex, row) {
  return scriptCall({ action: 'update', rowIndex, row });
}

async function clearRow(rowIndex) {
  return scriptCall({ action: 'clear', rowIndex });
}

async function ensureHeaders() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A1?key=${API_KEY}`;
    const r = await fetch(url);
    const data = await r.json();
    if (!data.values) {
      await scriptCall({ action: 'append', row: ['ID','Massif','Nom commun','Nom latin','Date plantation','Exposition','Floraison','Couleur','Sol','Arrosage','Taille adulte','Notes','Image URL'] });
    }
  } catch(e) {}
}

// ── Render ─────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML = MASSIFS.map(m => {
    const c = plants.filter(p => p.massif === m).length;
    return `<button class="tab ${m===currentMassif?'active':''}" onclick="selectMassif(${JSON.stringify(m)})">${m} <span style="opacity:.5;font-size:11px">${c}</span></button>`;
  }).join('');
}

function renderGrid() {
  document.getElementById('massifTitle').textContent = currentMassif;
  const filtered = plants.filter(p => p.massif === currentMassif);
  document.getElementById('massifCount').textContent = filtered.length ? `· ${filtered.length} plante${filtered.length>1?'s':''}` : '';
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><div>Aucune plante dans ce massif</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const img = p.imgUrl || getImg(p.nom);
    const imgHtml = img
      ? `<img class="card-img" src="${img}" alt="${p.nom}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-placeholder">${getIcon(p.nom)}</div>`;
    return `<div class="card" onclick="openDetail(${JSON.stringify(p.id)})">
      ${imgHtml}
      <div class="card-overlay"></div>
      <div class="card-body">
        <div class="card-name">${p.nom}</div>
        <div class="card-latin">${p.latin||''}</div>
        <div class="card-tags">
          ${p.floraison?`<span class="tag tag-flor">${p.floraison}</span>`:''}
          ${p.expo?`<span class="tag tag-expo">${p.expo}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectMassif(m) {
  currentMassif = m;
  renderTabs();
  renderGrid();
}

// ── Formulaire ajout / modif ───────────────────────────
function populateMassifSelect() {
  document.getElementById('fMassif').innerHTML = MASSIFS.map(m => `<option value="${m}">${m}</option>`).join('');
}

function clearForm() {
  ['fNom','fLatin','fFlor','fCoul','fSol','fTaille','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').value = '';
  document.getElementById('fExpo').value = '';
  document.getElementById('fArro').value = '';
}

function openAdd() {
  editingId = null;
  document.getElementById('addModalTitle').textContent = 'Ajouter une plante';
  document.getElementById('btnDel').style.display = 'none';
  clearForm();
  document.getElementById('fMassif').value = currentMassif;
  document.getElementById('addOverlay').classList.add('open');
}

// ── Génération IA ──────────────────────────────────────
async function generateFiche() {
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) { showToast('Entre le nom de la plante d\'abord'); return; }

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  document.getElementById('genIcon').outerHTML = '<span class="spinner" id="genIcon"></span>';

  try {
    // On utilise le sheet Apps Script comme proxy pour éviter CORS avec l'API Anthropic.
    // Si pas de clé Anthropic dispo, on utilise une base de données locale de secours.
    const info = await getPlantInfo(nom);
    if (info) {
      if (info.latin    && !document.getElementById('fLatin').value) document.getElementById('fLatin').value = info.latin;
      if (info.expo     && !document.getElementById('fExpo').value)  document.getElementById('fExpo').value  = info.expo;
      if (info.floraison&& !document.getElementById('fFlor').value)  document.getElementById('fFlor').value  = info.floraison;
      if (info.couleur  && !document.getElementById('fCoul').value)  document.getElementById('fCoul').value  = info.couleur;
      if (info.sol      && !document.getElementById('fSol').value)   document.getElementById('fSol').value   = info.sol;
      if (info.arrosage && !document.getElementById('fArro').value)  document.getElementById('fArro').value  = info.arrosage;
      if (info.taille   && !document.getElementById('fTaille').value)document.getElementById('fTaille').value= info.taille;
      if (info.notes    && !document.getElementById('fNotes').value) document.getElementById('fNotes').value = info.notes;
      showToast('✦ Fiche générée !');
    } else {
      showToast('Plante inconnue · remplis manuellement');
    }
  } catch(e) {
    showToast('Génération indisponible · remplis manuellement');
  }

  document.getElementById('genIcon').outerHTML = '<span id="genIcon">✦</span>';
  btn.disabled = false;
}

async function getPlantInfo(nom) {
  const n = nom.toLowerCase().trim();
  // Recherche dans la base locale
  for (const [key, val] of Object.entries(PLANT_DB)) {
    if (n.includes(key) || key.includes(n)) return val;
  }
  // Si pas trouvé, on tente via le proxy Apps Script (si configuré avec IA)
  return null;
}

// ── Enregistrer ────────────────────────────────────────
async function savePlant() {
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) { showToast('Le nom est obligatoire'); return; }

  const btn = document.getElementById('btnSave');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const imgUrl = getImg(nom) || '';
  const row = [
    editingId || Date.now().toString(36),
    document.getElementById('fMassif').value,
    nom,
    document.getElementById('fLatin').value,
    document.getElementById('fDate').value,
    document.getElementById('fExpo').value,
    document.getElementById('fFlor').value,
    document.getElementById('fCoul').value,
    document.getElementById('fSol').value,
    document.getElementById('fArro').value,
    document.getElementById('fTaille').value,
    document.getElementById('fNotes').value,
    imgUrl
  ];

  try {
    if (editingId) {
      const p = plants.find(x => x.id === editingId);
      if (p) await updateRow(p.rowIndex, row);
    } else {
      await appendRow(row);
    }
    currentMassif = row[1];
    closeOverlay('addOverlay');
    showToast(editingId ? 'Plante modifiée ✓' : 'Plante ajoutée ✓');
    await syncNow();
  } catch(e) {
    showToast('Erreur d\'enregistrement : ' + e.message);
  }

  btn.innerHTML = 'Enregistrer';
  btn.disabled = false;
}

async function deletePlant() {
  if (!editingId || !confirm('Supprimer cette plante définitivement ?')) return;
  const p = plants.find(x => x.id === editingId);
  if (p) {
    await clearRow(p.rowIndex);
    closeOverlay('addOverlay');
    showToast('Plante supprimée');
    await syncNow();
  }
}

// ── Détail ─────────────────────────────────────────────
function openDetail(id) {
  const p = plants.find(x => x.id === id);
  if (!p) return;
  viewingId = id;
  document.getElementById('detTitle').textContent = p.nom;
  const img = p.imgUrl || getImg(p.nom);
  const hero = img
    ? `<img class="detail-hero" src="${img}" alt="${p.nom}" onerror="this.outerHTML='<div class=detail-hero-placeholder>${getIcon(p.nom)}</div>'">`
    : `<div class="detail-hero-placeholder">${getIcon(p.nom)}</div>`;
  const fields = [
    ['Massif', p.massif], ['Nom latin', p.latin],
    ['Date de plantation', p.date], ['Exposition', p.expo],
    ['Floraison', p.floraison], ['Couleur', p.couleur],
    ['Type de sol', p.sol], ['Arrosage', p.arrosage],
    ['Taille adulte', p.taille]
  ].filter(f => f[1]);
  document.getElementById('detBody').innerHTML = `
    ${hero}
    <div class="detail-grid">
      ${fields.map(([l,v]) => `<div class="df"><div class="dl">${l}</div><div class="dv">${v}</div></div>`).join('')}
    </div>
    ${p.notes ? `<div class="notes-box">📝 ${p.notes}</div>` : ''}
  `;
  document.getElementById('detOverlay').classList.add('open');
}

function editFromDetail() {
  closeOverlay('detOverlay');
  const p = plants.find(x => x.id === viewingId);
  if (!p) return;
  editingId = p.id;
  document.getElementById('addModalTitle').textContent = 'Modifier la plante';
  document.getElementById('btnDel').style.display = 'inline-flex';
  document.getElementById('fNom').value     = p.nom      || '';
  document.getElementById('fLatin').value   = p.latin    || '';
  document.getElementById('fMassif').value  = p.massif   || currentMassif;
  document.getElementById('fDate').value    = p.date     || '';
  document.getElementById('fExpo').value    = p.expo     || '';
  document.getElementById('fFlor').value    = p.floraison|| '';
  document.getElementById('fCoul').value    = p.couleur  || '';
  document.getElementById('fSol').value     = p.sol      || '';
  document.getElementById('fArro').value    = p.arrosage || '';
  document.getElementById('fTaille').value  = p.taille   || '';
  document.getElementById('fNotes').value   = p.notes    || '';
  document.getElementById('addOverlay').classList.add('open');
}

function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

// ── Utilitaires ────────────────────────────────────────
async function syncNow() {
  await fetchPlants();
  renderTabs();
  renderGrid();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ───────────────────────────────────────────────
async function init() {
  populateMassifSelect();
  await ensureHeaders();
  await syncNow();
}

init();
</script>
