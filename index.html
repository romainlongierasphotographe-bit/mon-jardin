<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Jardin">
<title>Mon Jardin</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1a0f;--bg2:#162016;--bg3:#1e2e1e;--bg4:#253025;
  --green:#4a8c4a;--greenl:#7ab87a;--greend:#2d5a2d;
  --cream:#f0ead8;--cream2:#c8bfa8;--cream3:#8a8070;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --r:16px;--rs:10px;
  --blue:#3b82f6;--orange:#f59e0b;--purple:#8b5cf6;--pink:#ec4899;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;font-size:15px}
/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.25rem;position:sticky;top:0;z-index:40}
.header-row{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-leaf{width:26px;height:26px;background:var(--green);border-radius:50% 50% 50% 0;transform:rotate(-45deg);flex-shrink:0}
.header-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0}
.sync-dot.ok{background:var(--greenl)}.sync-dot.err{background:#e07070}.sync-dot.loading{background:#f0c040;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.menu-btn{width:40px;height:40px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.menu-btn span{display:block;width:18px;height:2px;background:var(--cream);border-radius:2px;transition:all .2s}
/* ── SIDE MENU ── */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50}
.menu-overlay.open{display:block}
.side-menu{position:fixed;top:0;right:-300px;width:280px;height:100%;background:var(--bg2);border-left:1px solid var(--border2);z-index:51;transition:right .25s;padding:0;overflow-y:auto;display:flex;flex-direction:column}
.side-menu.open{right:0}
.side-menu-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.side-menu-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--cream)}
.close-menu{background:none;border:none;color:var(--cream3);font-size:22px;cursor:pointer}
.menu-item{display:flex;align-items:center;gap:14px;padding:1rem 1.25rem;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:var(--cream);font-size:15px;font-family:'DM Sans',sans-serif;border-bottom:1px solid var(--border);transition:background .15s}
.menu-item:hover{background:var(--bg3)}
.menu-item-icon{width:36px;height:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.menu-item-label{font-weight:500}
.menu-item-sub{font-size:12px;color:var(--cream3);margin-top:2px}
/* ── NAV TABS ── */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 1.25rem;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:10px 16px 11px;font-size:14px;color:var(--cream3);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--cream)}.nav-tab.active{color:var(--cream);border-bottom-color:var(--greenl);font-weight:600}
/* ── MASSIF TABS ── */
.massif-bar{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1.25rem;background:var(--bg3)}
.massif-bar::-webkit-scrollbar{display:none}
.massif-tab{flex-shrink:0;padding:8px 14px 9px;font-size:13px;color:rgba(240,234,216,0.45);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.massif-tab:hover{color:var(--cream)}.massif-tab.active{color:var(--cream);border-bottom-color:var(--green);font-weight:500}
/* ── PAGES ── */
.page{display:none}.page.active{display:block}
.page-inner{padding:1.25rem;max-width:960px;margin:0 auto}
/* ── GRID ── */
.page-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream);margin-bottom:1.25rem;display:flex;align-items:baseline;gap:10px}
.page-title-sub{font-size:13px;color:var(--cream3);font-family:'DM Sans',sans-serif;font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.card{border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:3/4;background:var(--bg3);transition:transform .18s,box-shadow .18s;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 36px rgba(0,0,0,0.4)}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img{transform:scale(1.06)}
.card-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,10,5,0.92) 0%,rgba(5,10,5,0.15) 55%,transparent 100%)}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:.875rem}
.card-name{font-family:'Playfair Display',serif;font-size:15px;color:#fff;line-height:1.25;margin-bottom:3px}
.card-latin{font-size:11px;color:rgba(255,255,255,0.45);font-style:italic;margin-bottom:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.ptag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;border:1px solid}
.ptag-g{background:rgba(74,140,74,0.25);color:#a8e0a8;border-color:rgba(74,140,74,0.35)}
.ptag-y{background:rgba(245,158,11,0.2);color:#fcd87a;border-color:rgba(245,158,11,0.28)}
.ptag-p{background:rgba(139,92,246,0.2);color:#d4b8ff;border-color:rgba(139,92,246,0.28)}
.empty{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--cream3)}
/* ── DETAIL MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;overflow-y:auto;padding:1rem}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--r);width:100%;max-width:540px;margin:auto;overflow:hidden}
/* Detail header */
.det-hero-wrap{position:relative;height:240px;background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.det-hero{width:100%;height:100%;object-fit:cover}
.det-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px}
.det-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,10,5,0.95) 0%,transparent 50%)}
.det-hero-body{position:absolute;bottom:0;left:0;right:0;padding:1.25rem}
.det-name{font-family:'Playfair Display',serif;font-size:26px;color:#fff;margin-bottom:4px}
.det-latin{font-size:14px;color:rgba(255,255,255,0.5);font-style:italic;margin-bottom:10px}
.det-tags{display:flex;flex-wrap:wrap;gap:6px}
.dtag{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;border:1px solid}
.dtag-blue{background:rgba(59,130,246,0.2);color:#93c5fd;border-color:rgba(59,130,246,0.3)}
.dtag-green{background:rgba(74,140,74,0.25);color:#a8e0a8;border-color:rgba(74,140,74,0.35)}
.dtag-orange{background:rgba(245,158,11,0.2);color:#fcd87a;border-color:rgba(245,158,11,0.28)}
.dtag-red{background:rgba(239,68,68,0.2);color:#fca5a5;border-color:rgba(239,68,68,0.28)}
.dtag-purple{background:rgba(139,92,246,0.2);color:#d4b8ff;border-color:rgba(139,92,246,0.28)}
/* Det body */
.det-body{padding:1.25rem}
.det-section{margin-bottom:1.5rem}
.det-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--cream3);font-weight:600;margin-bottom:.875rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.det-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.det-card{background:var(--bg3);border-radius:var(--rs);padding:12px}
.det-card-title{font-size:11px;color:var(--cream3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.det-card-title svg,.det-card-title span.icon{margin-right:2px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-row-label{font-size:13px;color:var(--cream3)}
.det-row-val{font-size:14px;color:var(--cream);font-weight:500;text-align:right;max-width:55%}
/* Bars */
.bar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:13px;color:var(--cream2);width:90px;flex-shrink:0}
.bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin:0 10px}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-size:12px;color:var(--cream3);width:56px;text-align:right;flex-shrink:0}
/* Info cards */
.info-card{background:var(--bg3);border-radius:var(--rs);padding:12px;border-left:3px solid}
.info-card.green{border-color:var(--green)}
.info-card.orange{border-color:#f59e0b}
.info-card.red{border-color:#ef4444}
.info-card.blue{border-color:#3b82f6}
.info-card-title{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.info-card li{font-size:13px;color:var(--cream2);margin-bottom:4px;padding-left:14px;position:relative;line-height:1.5}
.info-card li::before{content:'→';position:absolute;left:0;color:var(--cream3)}
/* Mult rows */
.mult-row{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.mult-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;flex-shrink:0;margin-top:1px}
.mult-info-period{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:3px}
.mult-info-tip{font-size:13px;color:var(--cream2);line-height:1.5}
/* Date badges */
.date-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.5rem}
.date-badge{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--bg3);border:1px solid var(--border2);color:var(--cream2)}
/* Actions modal (add/edit) */
.form-modal{background:var(--bg2);border-radius:var(--r);width:100%;max-width:520px;margin:auto;padding:1.5rem}
.form-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.form-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream)}
.bx{background:none;border:none;color:var(--cream3);font-size:22px;cursor:pointer}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--cream3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.field input,.field select,.field textarea{width:100%;border-radius:var(--rs);border:1px solid var(--border2);padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--cream);background:var(--bg3);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field textarea{min-height:72px;resize:vertical}
.field select option{background:var(--bg2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-sep{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--cream3);font-weight:600;padding:.875rem 0 .625rem;border-top:1px solid var(--border);margin-top:.25rem}
.mult-form-block{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:.875rem}
.mult-form-title{font-size:13px;font-weight:600;color:var(--greenl);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.photo-zone{border:2px dashed var(--border2);border-radius:var(--rs);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:1rem}
.photo-zone:hover{border-color:var(--green)}
.photo-zone input{display:none}
.photo-preview{width:100%;height:150px;object-fit:cover;border-radius:var(--rs);margin-bottom:.5rem;display:none}
.photo-label{font-size:13px;color:var(--cream3)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn{padding:10px 18px;border-radius:var(--rs);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-weight:600;transition:all .15s}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--cream2)}.btn-o:hover{border-color:var(--green);color:var(--greenl)}
.btn-g{background:var(--green);border:none;color:#fff}.btn-g:hover{background:var(--greend)}
.btn-r{background:transparent;border:1px solid rgba(239,68,68,0.4);color:#fca5a5;margin-right:auto}.btn-r:hover{background:rgba(239,68,68,0.1)}
.btn-ai{background:var(--bg4);border:1px solid var(--border2);color:var(--greenl);width:100%;justify-content:center;margin-bottom:.75rem;font-size:14px}
.btn-ai:hover{background:var(--bg3)}.btn-ai:disabled{opacity:.4;cursor:not-allowed}
.ai-hint{font-size:12px;color:var(--cream3);text-align:center;margin-bottom:1rem;margin-top:-.5rem}
.add-mult-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.875rem}
.add-mult-btn{font-size:12px;padding:5px 11px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--cream2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.add-mult-btn:hover{border-color:var(--green);color:var(--greenl)}
/* ── CALENDAR / MOIS ── */
.cal-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.cal-btn{padding:7px 15px;border-radius:var(--rs);border:1px solid var(--border2);font-size:13px;cursor:pointer;background:transparent;color:var(--cream2);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.cal-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.cal-filter{padding:7px 12px;border-radius:var(--rs);border:1px solid var(--border2);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--cream);background:var(--bg3)}
.cal-filter option{background:var(--bg2)}
.cal-grid12{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.cal-month{background:var(--bg2);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden}
.cal-month.now{border-color:var(--green)}
.cal-month-hdr{background:var(--bg3);color:var(--cream2);font-size:13px;font-weight:600;padding:7px 12px;display:flex;align-items:center;justify-content:space-between}
.cal-month.now .cal-month-hdr{background:var(--greend);color:var(--cream)}
.cal-month-body{padding:8px;min-height:50px}
.cal-entry{font-size:12px;padding:3px 7px;border-radius:5px;margin-bottom:4px;cursor:pointer;line-height:1.3;border-left:2px solid}
.ce-semis{background:rgba(74,140,74,0.15);color:#a8e0a8;border-color:#4a8c4a}
.ce-bouturage{background:rgba(59,130,246,0.15);color:#93c5fd;border-color:#3b82f6}
.ce-division{background:rgba(245,158,11,0.15);color:#fcd87a;border-color:#f59e0b}
.ce-marcottage{background:rgba(139,92,246,0.15);color:#d4b8ff;border-color:#8b5cf6}
.ce-greffe{background:rgba(236,72,153,0.15);color:#f9a8d4;border-color:#ec4899}
.ce-taille{background:rgba(239,68,68,0.15);color:#fca5a5;border-color:#ef4444}
.ce-arrosage{background:rgba(14,165,233,0.15);color:#7dd3fc;border-color:#0ea5e9}
.ce-engrais{background:rgba(16,185,129,0.15);color:#6ee7b7;border-color:#10b981}
.cal-list-month{background:var(--bg2);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.cal-list-month.now{border-color:var(--green)}
.cal-list-hdr{background:var(--bg3);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.cal-list-hdr-name{font-size:15px;font-weight:600;color:var(--cream)}
.cal-list-hdr-badge{font-size:12px;background:rgba(255,255,255,0.1);padding:2px 9px;border-radius:99px;color:var(--cream2)}
.cal-list-body{padding:8px}
.cal-list-entry{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:var(--rs);margin-bottom:4px;cursor:pointer;transition:background .12s}
.cal-list-entry:last-child{margin-bottom:0}
.cal-list-entry:hover{background:var(--bg3)}
.cle-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cle-info{flex:1;min-width:0}
.cle-name{font-size:14px;font-weight:500;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cle-detail{font-size:12px;color:var(--cream3);margin-top:1px;line-height:1.4}
.cle-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border2);color:var(--cream);padding:11px 22px;border-radius:99px;font-size:14px;z-index:200;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--greenl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo" id="btnLogoHome">
      <div class="logo-leaf"></div>
      Mon Jardin
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sdot" title="Statut synchronisation"></div>
      <button class="menu-btn" id="btnMenu" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-nav="massifs">🌿 Massifs</button>
    <button class="nav-tab" data-nav="calendrier">📅 Multiplication</button>
    <button class="nav-tab" data-nav="mois">🗓 Ce mois-ci</button>
  </div>
</header>

<!-- Side menu -->
<div class="menu-overlay" id="menuOverlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-hdr">
    <span class="side-menu-title">Mon Jardin</span>
    <button class="close-menu" id="btnCloseMenu">✕</button>
  </div>
  <button class="menu-item" data-goto="massifs">
    <div class="menu-item-icon" style="background:rgba(74,140,74,0.2)">🌿</div>
    <div><div class="menu-item-label">Mes massifs</div><div class="menu-item-sub">Vue par massif</div></div>
  </button>
  <button class="menu-item" data-goto="calendrier">
    <div class="menu-item-icon" style="background:rgba(59,130,246,0.2)">📅</div>
    <div><div class="menu-item-label">Multiplication</div><div class="menu-item-sub">Semis, bouturage, division…</div></div>
  </button>
  <button class="menu-item" data-goto="mois">
    <div class="menu-item-icon" style="background:rgba(245,158,11,0.2)">🗓</div>
    <div><div class="menu-item-label">Ce mois-ci</div><div class="menu-item-sub">Que faire au jardin</div></div>

// ── STATE ────────────────────────────────────────────────────────
let plants=[],currentMassif=MASSIFS[0],editingId=null,viewingId=null;
let currentNav='massifs',calViewMode='grid',multEntries=[],currentPhoto='';

// ── SYNC STATUS ──────────────────────────────────────────────────
function setSS(s,t){document.getElementById('sdot').className='sync-dot '+s;document.getElementById('sdot').title=t;}

// ── SHEETS API ───────────────────────────────────────────────────
async function fetchPlants(){
  setSS('loading','Chargement…');
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:R?key=${API_KEY}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const rows=d.values||[];
    plants=[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];if(!row||!row[2])continue;
      let mult=[];try{if(row[14])mult=JSON.parse(row[14]);}catch(e){}
      plants.push({rowIndex:i+1,id:row[0]||String(i),massif:row[1]||'',nom:row[2]||'',latin:row[3]||'',expo:row[5]||'',floraison:row[6]||'',couleur:row[7]||'',sol:row[8]||'',arrosage:row[9]||'',taille:row[10]||'',notes:row[11]||'',photo:row[13]||'',mult,datesPlantation:row[15]||'',datesSemis:row[16]||'',datesTaille:row[17]||''});
    }
    setSS('ok',`Synchronisé · ${plants.length} plantes`);
  }catch(e){setSS('err','Erreur : '+e.message);}
}
async function scriptCall(p){
  const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)});
  try{return await r.json();}catch(e){return{ok:true};}
}
async function ensureHeaders(){
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A1?key=${API_KEY}`);
    const d=await r.json();
    if(!d.values)await scriptCall({action:'append',row:['ID','Massif','Nom commun','Nom latin','Date plantation','Exposition','Floraison','Couleur','Sol','Arrosage','Taille adulte','Notes','Image URL','Photo','Multiplication','Dates plantation','Dates semis','Dates taille']});
  }catch(e){}
}

// ── NAVIGATION ───────────────────────────────────────────────────
function showNav(nav){
  currentNav=nav;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.nav===nav));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+nav));
  closeMenu();
  if(nav==='calendrier')renderCal();
  if(nav==='mois')renderMois();
}

// ── MENU ─────────────────────────────────────────────────────────
function openMenu(){document.getElementById('sideMenu').classList.add('open');document.getElementById('menuOverlay').classList.add('open');}
function closeMenu(){document.getElementById('sideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('open');}

// ── MASSIF TABS ──────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('massifBar').innerHTML=MASSIFS.map(m=>{
    const c=plants.filter(p=>p.massif===m).length;
    return `<button class="massif-tab ${m===currentMassif?'active':''}" data-massif="${m}">${m} <span style="opacity:.4;font-size:11px">${c}</span></button>`;
  }).join('');
}

async function renderGrid(){
  document.getElementById('massifTitle').textContent=currentMassif;
  const filtered=plants.filter(p=>p.massif===currentMassif);
  document.getElementById('massifCount').textContent=filtered.length?`· ${filtered.length} plante${filtered.length>1?'s':''}`:' ';
  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1">🌱<br><br>Aucune plante dans ce massif</div>`;return;}
  grid.innerHTML=filtered.map(p=>{
    const hasMult=p.mult&&p.mult.length;
    return `<div class="card" data-id="${p.id}">
      ${p.photo?`<img class="card-img" src="${p.photo}" alt="${p.nom}">`:`<div class="card-ph" id="ph_${p.id}">${getIcon(p.nom)}</div>`}
      <div class="card-ov"></div>
      <div class="card-body">
        <div class="card-name">${p.nom}</div>
        <div class="card-latin">${p.latin||''}</div>
        <div class="card-tags">
          ${p.floraison?`<span class="ptag ptag-g">${p.floraison}</span>`:''}

// ── CALENDAR MULT ─────────────────────────────────────────────────
function parseMois(start,end){
  if(!start)return[];
  const si=MOIS_NOM.findIndex(m=>m===start);
  const ei=end?MOIS_NOM.findIndex(m=>m===end):-1;
  if(si<0)return[];
  if(ei<0||ei===si)return[si];
  const res=[];let cur=si;
  while(true){res.push(cur);if(cur===ei)break;cur=(cur+1)%12;if(res.length>12)break;}
  return res;
}

function getMultEntries(){
  const method=document.getElementById('filterMethod').value;
  const entries=[];
  plants.forEach(p=>{
    const src=(p.mult&&p.mult.length)?p.mult:((()=>{const n=p.nom.toLowerCase();for(const[k,v]of Object.entries(DB)){if((n.includes(k)||k.includes(n))&&v.mult)return v.mult;}return[];})());
    src.forEach(m=>{
      if(method&&m.method!==method)return;
      entries.push({plant:p,method:m.method,periodStart:m.periodStart,periodEnd:m.periodEnd,tip:m.tip,mois:parseMois(m.periodStart,m.periodEnd)});
    });
  });
  return entries;
}

function renderCal(){
  const entries=getMultEntries();
  if(calViewMode==='grid')renderCalGrid(entries);
  else renderCalList(entries);
}

function renderCalGrid(entries){
  const now=new Date().getMonth();
  const byM=Array.from({length:12},()=>[]);
  entries.forEach(e=>e.mois.forEach(m=>byM[m].push(e)));
  document.getElementById('calView').innerHTML=`<div class="cal-grid12">${MOIS_NOM.map((m,i)=>`
    <div class="cal-month ${i===now?'now':''}">
      <div class="cal-month-hdr">${m}${i===now?' 📍':''}<span style="font-size:11px;opacity:.6">${byM[i].length||''}</span></div>
      <div class="cal-month-body">${byM[i].length?byM[i].map(e=>`<div class="cal-entry ce-${e.method}" data-id="${e.plant.id}">${MULT_ICONS[e.method]} ${e.plant.nom}</div>`).join(''):'<span style="font-size:11px;color:#555">—</span>'}</div>
    </div>`).join('')}</div>`;
}

function renderCalList(entries){
  const now=new Date().getMonth();
  const byM=Array.from({length:12},()=>[]);
  entries.forEach(e=>e.mois.forEach(m=>byM[m].push(e)));
  const order=[...Array(12).keys()].map(i=>(i+now)%12);
  document.getElementById('calView').innerHTML='<div>'+order.filter(i=>byM[i].length).map(i=>`
    <div class="cal-list-month ${i===now?'now':''}">
      <div class="cal-list-hdr"><span class="cal-list-hdr-name">${MOIS_NOM[i]}${i===now?' 📍':''}</span><span class="cal-list-hdr-badge">${byM[i].length}</span></div>
      <div class="cal-list-body">${byM[i].map(e=>`
        <div class="cal-list-entry" data-id="${e.plant.id}">
          <div class="cle-icon" style="background:${MULT_COLORS[e.method]}">${MULT_ICONS[e.method]}</div>
          <div class="cle-info"><div class="cle-name">${e.plant.nom}</div><div class="cle-detail">${e.tip||''}</div></div>
          <span class="cle-badge" style="background:${MULT_COLORS[e.method]};color:${MULT_TEXT[e.method]}">${e.method}</span>
        </div>`).join('')}
      </div>
    </div>`).join('')+'</div>';
}

// ── CE MOIS-CI ────────────────────────────────────────────────────
function initMoisFilter(){
  const sel=document.getElementById('filterMois');
  const now=new Date().getMonth();
  sel.innerHTML='<option value="">Ce mois-ci</option>'+MOIS_NOM.map((m,i)=>`<option value="${i}" ${i===now?'selected':''}>${m}</option>`).join('');
  document.getElementById('moisCourant').textContent='· '+MOIS_NOM[now];
}

function renderMois(){
  const moisVal=document.getElementById('filterMois').value;
  const moisIdx=moisVal===''?new Date().getMonth():parseInt(moisVal);
  const actionFilter=document.getElementById('filterAction').value;
  document.getElementById('moisCourant').textContent='· '+MOIS_NOM[moisIdx];

  // Gather all actions for this month from DB
  const entries=[];
  plants.forEach(p=>{
    const n=p.nom.toLowerCase();
    let db=null;for(const[k,v]of Object.entries(DB)){if(n.includes(k)||k.includes(n)){db=v;break;}}
    if(!db||!db.actions)return;
    db.actions.forEach(a=>{
      if(!a.mois.includes(moisIdx))return;
      if(actionFilter&&a.type!==actionFilter)return;
      entries.push({plant:p,type:a.type,tip:a.tip});
    });
    // Also mult
    const src=(p.mult&&p.mult.length)?p.mult:(db.mult||[]);
    src.forEach(m=>{
      const mois=parseMois(m.periodStart,m.periodEnd);
      if(!mois.includes(moisIdx))return;
      if(actionFilter&&actionFilter!==m.method&&actionFilter!=='bouturage'&&actionFilter!=='semis')return;
      if(!actionFilter||actionFilter===m.method)
        entries.push({plant:p,type:m.method,tip:m.tip||m.method+' possible ce mois-ci'});
    });
  });

  if(!entries.length){
    document.getElementById('moisView').innerHTML=`<div class="empty">😴<br><br>Pas d'actions prévues ce mois-ci<br><span style="font-size:13px">Profites-en pour observer ton jardin !</span></div>`;
    return;
  }

  // Group by action type
  const byType={};
  entries.forEach(e=>{if(!byType[e.type])byType[e.type]=[];byType[e.type].push(e);});
  document.getElementById('moisView').innerHTML=Object.entries(byType).map(([type,items])=>`
    <div class="cal-list-month" style="margin-bottom:10px">
      <div class="cal-list-hdr" style="background:${ACTION_BG[type]||'var(--bg3)'}">
        <span class="cal-list-hdr-name">${ACTION_ICONS[type]||'📝'} ${type.charAt(0).toUpperCase()+type.slice(1)}</span>
        <span class="cal-list-hdr-badge">${items.length}</span>
      </div>
      <div class="cal-list-body">${items.map(e=>`
        <div class="cal-list-entry" data-id="${e.plant.id}">
          <div class="cle-icon">${getIcon(e.plant.nom)}</div>
          <div class="cle-info"><div class="cle-name">${e.plant.nom}</div><div class="cle-detail">${e.tip||''}</div></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── UTILS ─────────────────────────────────────────────────────────
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
async function syncNow(){await fetchPlants();renderTabs();await renderGrid();if(currentNav==='calendrier')renderCal();if(currentNav==='mois')renderMois();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ── EVENT LISTENERS ───────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>showNav(t.dataset.nav)));
document.querySelectorAll('[data-goto]').forEach(t=>t.addEventListener('click',()=>showNav(t.dataset.goto)));
document.getElementById('btnMenu').addEventListener('click',openMenu);
document.getElementById('btnCloseMenu').addEventListener('click',closeMenu);
document.getElementById('menuOverlay').addEventListener('click',closeMenu);
document.getElementById('menuBtnAdd').addEventListener('click',()=>{closeMenu();openAdd();});
document.getElementById('menuBtnSync').addEventListener('click',()=>{closeMenu();syncNow();});
document.getElementById('btnLogoHome').addEventListener('click',()=>showNav('massifs'));
document.getElementById('massifBar').addEventListener('click',e=>{const t=e.target.closest('[data-massif]');if(t)selectMassif(t.dataset.massif);});
document.getElementById('grid').addEventListener('click',e=>{const c=e.target.closest('[data-id]');if(c)openDetail(c.dataset.id);});
document.getElementById('calView').addEventListener('click',e=>{const c=e.target.closest('[data-id]');if(c){closeOverlay('detOverlay');openDetail(c.dataset.id);}});
document.getElementById('moisView').addEventListener('click',e=>{const c=e.target.closest('[data-id]');if(c){closeOverlay('detOverlay');openDetail(c.dataset.id);}});
document.getElementById('btnEdit').addEventListener('click',editFromDetail);
document.getElementById('btnCloseDet').addEventListener('click',()=>closeOverlay('detOverlay'));
document.getElementById('btnCloseAdd').addEventListener('click',()=>closeOverlay('addOverlay'));
document.getElementById('btnCancelAdd').addEventListener('click',()=>closeOverlay('addOverlay'));
document.getElementById('btnSave').addEventListener('click',savePlant);
document.getElementById('btnDel').addEventListener('click',deletePlant);
document.getElementById('btnGen').addEventListener('click',generateFiche);
document.getElementById('btnCalGrid').addEventListener('click',()=>{calViewMode='grid';document.getElementById('btnCalGrid').classList.add('active');document.getElementById('btnCalList').classList.remove('active');renderCal();});
document.getElementById('btnCalList').addEventListener('click',()=>{calViewMode='list';document.getElementById('btnCalList').classList.add('active');document.getElementById('btnCalGrid').classList.remove('active');renderCal();});
document.getElementById('filterMethod').addEventListener('change',renderCal);
document.getElementById('filterMois').addEventListener('change',()=>{const v=document.getElementById('filterMois').value;document.getElementById('moisCourant').textContent='· '+(v===''?MOIS_NOM[new Date().getMonth()]:MOIS_NOM[parseInt(v)]);renderMois();});
document.getElementById('filterAction').addEventListener('change',renderMois);
document.getElementById('multAddBtns').addEventListener('click',e=>{const b=e.target.closest('[data-addmult]');if(b)addMult(b.dataset.addmult);});
document.getElementById('photoZone').addEventListener('click',()=>document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change',e=>handlePhoto(e.target.files[0]));
document.getElementById('photoZone').addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--green)';});
document.getElementById('photoZone').addEventListener('dragleave',e=>{e.currentTarget.style.borderColor='';});
document.getElementById('photoZone').addEventListener('drop',e=>{e.preventDefault();e.currentTarget.style.borderColor='';handlePhoto(e.dataTransfer.files[0]);});

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  populateMassifSelect();
  initMoisFilter();
  await ensureHeaders();
  await syncNow();
}
init();
</script>
